<!DOCTYPE html>
<meta charset="utf-8">

<!-- Load d3.js and the geo projection plugin -->
<script src="https://d3js.org/d3.v4.js"></script>
<script src="https://d3js.org/d3-geo-projection.v2.min.js"></script>

<!-- Button -->
<div>
  <input type="checkbox" class="checkbox" value="Capital" checked><label>Capital</label>
  <input type="checkbox" class="checkbox" value="Interior" checked><label>Interior</label>
</div>

<!-- Create an element where the map will take place -->
<svg id="my_dataviz" width="1000" height="600"></svg>


<script>

// The svg
var svg = d3.select("svg"),
    width = +svg.attr("width"),
    height = +svg.attr("height");

// Map and projection
var projection = d3.geoMercator()
    .center([-46.9, -23.42])                // GPS of location to zoom on
    .scale(100000)                       // This is like the zoom
    .translate([ 0, 0 ])

// Create data for circles:
var markers = [
  {long: -46.60802940, lat: -23.58392790, group: "Capital", size: 34}, // Osasco
  {long: -47.65722230, lat: -22.72684060, group: "Interior", size: 87}, // Piracicaba
  {long: -47.07486100, lat: -22.90415500, group: "Interior", size: 41}, // Campinas
  {long: -46.64418460, lat: -23.58174120, group: "Capital", size: 12} // Vila Mariana
];

// Load external data and boot
d3.json("https://raw.githubusercontent.com/tbrugz/geodata-br/master/geojson/geojs-35-mun.json", function(data){

      // Filter data
    data.features = data.features.filter( function(d){return d.properties.name=="São Paulo"} )

    // Create a color scale
    var color = d3.scaleOrdinal()
      .domain(["Capital", "Interior" ])
      .range([ "#402D54", "#D18975"])

    // Add a scale for bubble size
    var size = d3.scaleLinear()
      .domain([1,100])  // What's in the data
      .range([ 4, 50])  // Size in pixel

    // Draw the map
    svg.append("g")
        .selectAll("path")
        .data(data.features)
        .enter()
        .append("path")
          .attr("fill", "#f2f2f2")
          .attr("d", d3.geoPath()
              .projection(projection)
          )
        .style("stroke", "darkred")
        .style("opacity", .3)

    // Add circles:
    svg
      .selectAll("myCircles")
      .data(markers)
      .enter()
      .append("circle")
        .attr("class" , function(d){ return d.group })
        .attr("cx", function(d){ return projection([d.long, d.lat])[0] })
        .attr("cy", function(d){ return projection([d.long, d.lat])[1] })
        .attr("r", function(d){ return size(d.size) })
        .style("fill", function(d){ return color(d.group) })
        .attr("stroke", function(d){ return color(d.group) })
        .attr("stroke-width", 3)
        .attr("fill-opacity", .4)


    // This function is gonna change the opacity and size of selected and unselected circles
    function update(){

      // For each check box:
      d3.selectAll(".checkbox").each(function(d){
        cb = d3.select(this);
        grp = cb.property("value")

        // If the box is check, I show the group
        if(cb.property("checked")){
          svg.selectAll("."+grp).transition().duration(1000).style("opacity", 1).attr("r", function(d){ return size(d.size) })

        // Otherwise I hide it
        }else{
          svg.selectAll("."+grp).transition().duration(1000).style("opacity", 0).attr("r", 0)
        }
      })
    }

    // When a button change, I run the update function
    d3.selectAll(".checkbox").on("change",update);

    // And I initialize it at the beginning
    update()
})

</script>
